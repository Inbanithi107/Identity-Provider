<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" th:href="@{css/error-style.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="error-page d-flex align-items-center justify-content-center">
        <div class="error-container text-center p-4">
            <h1 class="error-code mb-0" th:text="${code}"></h1>
            <h2 class="display-6 error-message mb-3">Error Occurred</h2>
            <p class="lead error-message mb-5" th:text="${message}"></p>
            <div class="d-flex justify-content-center gap-3">
                <a href="#" class="btn btn-glass px-4 py-2">Return Home</a>
                <a href="#" class="btn btn-glass px-4 py-2">Report Problem</a>
            </div>
        </div>
    </div>
</body>
</html>
